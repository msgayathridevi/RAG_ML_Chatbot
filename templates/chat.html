<!DOCTYPE html>
<html>
<head>
    <title>ML Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chat-container">
        <h2>ML & DL Learning Chatbot</h2>
        <p>Ask me anything</p>

        <div id="chat-box"></div>

        <form id="messageArea">
            <input
                type="text"
                id="text"
                name="msg"
                placeholder="Type your message..."
                autocomplete="off"
                required
            >
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $("#messageArea").on("submit", function(event) {
            event.preventDefault();

            let rawText = $("#text").val();

            $("#chat-box").append(
                "<div class='user-msg'><b>You:</b> " + rawText + "</div>"
            );

            $("#text").val("");

            $.ajax({
                data: { msg: rawText },
                type: "POST",
                url: "/get"
            }).done(function(data) {
                $("#chat-box").append(
                    "<div class='bot-msg'><b>Bot:</b> " + data + "</div>"
                );

                $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
            });
        });
    </script>

</body>
</html>
